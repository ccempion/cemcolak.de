version: '3.9'

volumes:
  n8n_storage:
    external: true
  postgres_storage:
    external: true
  cloudflared_data:
    external: true

networks:
  foampunchers:
    external: false
  proxy:
    external: false

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - foampunchers
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    networks:
      - foampunchers
      - proxy
    env_file:
      - .env
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - WEBHOOK_URL=https://${DOMAIN}/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_DISABLE_AUTOMATIC_MIGRATIONS=false
      - N8N_VERSION_NOTIFICATIONS_DISABLED=true
      - N8N_TRUST_PROXY=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_GIT_NODE_DISABLE_BARE_REPOS=true
      - N8N_SMTP_HOST=${N8N_SMTP_HOST}
      - N8N_SMTP_PORT=465
      - N8N_SMTP_USER=${N8N_SMTP_USER}
      - N8N_SMTP_PASSWORD=${N8N_SMTP_PASSWORD}
      - N8N_SMTP_SENDER_NAME=${N8N_SMTP_SENDER_NAME}
      - N8N_SMTP_SSL=${N8N_SMTP_SSL}
      - N8N_EMAIL_FROM=${N8N_EMAIL_FROM}
      - N8N_PROXY_HOPS=1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/backup:/backup
      - ./shared:/data/shared

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    networks:
      - proxy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - cloudflared_data:/etc/cloudflared

  kleinanzeigen-api:
    build:
      context: ../Developer/dockerfiles/ebay-kleinanzeigen-api-main/
    container_name: kleinanzeigen-api
    restart: unless-stopped
    networks:
      - foampunchers
      # - proxy # Einkommentieren, um die API über Cloudflare Tunnel erreichbar zu machen
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      # HINZUGEFÜGT: Proxy-Konfiguration für den Rotator
      - HTTP_PROXY=http://mubeng-rotator:8888
      - HTTPS_PROXY=http://mubeng-rotator:8888
    # ports: # ENTFERNT: Port 8000 wird nicht auf dem Host veröffentlicht.
    #  - "8000:8000"
    #expose: 
    #  - "8000" # Bleibt als interne Dokumentation
    depends_on:
      - mubeng-rotator # HINZUGEFÜGT
      - postgres


  mubeng-rotator:
      # Verwenden Sie das offiziell auf Docker Hub verfügbare Image
    image: gofrendi/mubeng
      # Der Container soll Zugriff auf die lokale Proxy-Liste haben
    volumes:
      - ./proxies.txt:/app/proxies.txt
      # Startet mubeng. Es lauscht standardmäßig auf 127.0.0.1:8080 (oder 8888, muss geprüft werden). 
      # Wir stellen sicher, dass es für alle Container erreichbar ist (0.0.0.0)
    command: -f /app/proxies.txt -a 0.0.0.0:8888 --rotate --daemon
      # Optional: Den Port nur für Debugging exponieren (die API greift intern darauf zu)
      # ports:
      #   - "8888:8888" 
    restart: unless-stopped
      
